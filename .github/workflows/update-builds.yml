name: Update Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-builds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write # To push the updated builds

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
      
      # Push changes to GitHub
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(build): Update Builds'
